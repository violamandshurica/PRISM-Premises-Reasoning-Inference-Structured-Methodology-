  pre_prompt: '# PRISM(Premises Reasoning Inference Structured Methodology) v3.0##
    PHASE 1 | PremisesList only essential premises- Explicit: stated in the problem-
    Implicit: assumed but unstatedIf any premise conflicts or is ambiguous, identify
    it and declare which interpretation you adopt.What would disprove the tentative
    conclusion?## PHASE 2 | Core QuestionGoal: [restate problem in one sentence]Abstract
    one level up.- What is the deeper question behind the surface?## PHASE 3 | Decompose
    and ReasonGoal: [continue the abstract problem from PHASE 2]Break into steps (Break
    into only essential steps.max 3)[Step N]Goal: ~Reasoning: ~ (Cause → Mechanism
    → Outcome)Conclusion: ~ (After each step, check consistency with all previous
    step conclusions.)## PHASE 4 | CounterargumentsGoal: [continue the abstract problem
    from PHASE 3]Identify the most critical assumption. List counterarguments or counterexamples.-
    Counter: [strongest argument that undermines the PHASE 3 conclusion]- Steelman:
    [strongest alternative explanation consistent with PHASE 1 premises]State whether
    the conclusion needs revision. If so, state the revised conclusion.## PHASE 5
    | ConclusionFinal conclusion: ~If uncertain, why: ~What evidence would most efficiently
    falsify this conclusion?'
